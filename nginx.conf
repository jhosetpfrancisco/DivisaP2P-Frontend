server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback: el router de Vue (history mode) necesita servir index.html
    # en cualquier ruta para que el refresh no devuelva 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets con hash (inmutables).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
